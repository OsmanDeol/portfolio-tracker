# ──────────────────────────────────────────────────────────────────
#  Portfolio Tracker — Auto Release
#
#  Trigger:  git tag v1.2.3  &&  git push origin v1.2.3
#
#  What happens automatically:
#    1. GitHub spins up a Windows machine
#    2. Installs Python + dependencies
#    3. Injects the version number everywhere
#    4. Builds PortfolioTracker.exe via PyInstaller
#    5. Builds PortfolioTracker-Setup.exe via Inno Setup
#    6. Creates a GitHub Release and uploads the Setup.exe
#
#  Users download the Setup.exe once.
#  After that, the app auto-updates itself on every new tag.
# ──────────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.2.3, etc.

permissions:
  contents: write     # needed to create GitHub Releases

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      # ── 1. Get the code ───────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pillow
          pip install -r requirements.txt

      # ── 4. Inno Setup ─────────────────────────────────────────
      - name: Install Inno Setup 6
        run: choco install innosetup --yes --no-progress

      # ── 5. Inject version ─────────────────────────────────────
      #  Writes the git tag into version.py and installer.iss
      #  so every build is stamped with the exact release version.
      - name: Inject version number
        shell: python
        run: |
          import os, re

          tag     = os.environ['GITHUB_REF_NAME']   # e.g. "v1.2.3"
          version = tag.lstrip('v')                 # e.g. "1.2.3"
          print(f"Building version: {version}")

          # version.py — read by the updater at runtime
          with open('version.py', 'w') as f:
              f.write(f'# Auto-generated by GitHub Actions — do not edit\n')
              f.write(f'__version__ = "{version}"\n')

          # installer.iss — version shown in the installer UI & Add/Remove Programs
          with open('installer.iss', 'r') as f:
              iss = f.read()

          iss = re.sub(r'(?m)^AppVersion=.*$',        f'AppVersion={version}',          iss)
          iss = re.sub(r'(?m)^VersionInfoVersion=.*$', f'VersionInfoVersion={version}.0', iss)

          with open('installer.iss', 'w') as f:
              f.write(iss)

      # ── 6. App icon ───────────────────────────────────────────
      - name: Generate icon
        run: python create_icon.py
        continue-on-error: true    # build continues even if icon fails

      # ── 7. PyInstaller ────────────────────────────────────────
      - name: Build executable
        run: |
          pyinstaller `
            --name "PortfolioTracker" `
            --onedir `
            --windowed `
            --icon=icon.ico `
            --add-data "templates;templates" `
            --hidden-import flask `
            --hidden-import flask_cors `
            --hidden-import yfinance `
            --hidden-import werkzeug `
            --hidden-import jinja2 `
            --hidden-import zoneinfo `
            --hidden-import _strptime `
            --collect-all yfinance `
            main.py

      # ── 8. Inno Setup installer ───────────────────────────────
      - name: Build installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # ── 9. Publish GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Portfolio Tracker ${{ github.ref_name }}"
          body: |
            ## What's new in ${{ github.ref_name }}

            Download **PortfolioTracker-Setup.exe** below and run it.
            The app will update itself automatically for all future versions.

            > Already installed? The app will prompt you to update automatically.
          files: Output/PortfolioTracker-Setup.exe
          generate_release_notes: true
